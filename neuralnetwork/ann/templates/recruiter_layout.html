{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}SkillSevak{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* ── Sidebar collapse transition ── */
      #sidebar {
        width: 16rem;
        transition: width 0.22s cubic-bezier(0.4,0,0.2,1);
        overflow: hidden;
        flex-shrink: 0;
      }
      #sidebar.ss-collapsed {
        width: 4.25rem;
      }

      /* Hide text labels when collapsed */
      #sidebar.ss-collapsed .ss-label { display: none; }
      #sidebar.ss-collapsed .ss-brand-text { display: none; }

      /* Center nav links when collapsed */
      #sidebar.ss-collapsed .ss-nav-link {
        justify-content: center;
        padding-left: 0;
        padding-right: 0;
      }

      /* Toggle icon rotation */
      #sidebar-toggle-icon {
        transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
      }
      #sidebar.ss-collapsed #sidebar-toggle-icon {
        transform: rotate(180deg);
      }
    </style>
  </head>
  <body class="min-h-screen bg-[#F8FAFC] text-slate-900">
    {% csrf_token %}
    <div class="flex min-h-screen">

      <!-- ── Sidebar ── -->
      <aside id="sidebar" class="hidden md:flex md:flex-col bg-white/80 backdrop-blur-xl border-r border-slate-200/60">

        <!-- Branding + toggle -->
        <div class="px-4 py-4 border-b border-slate-200/60 flex items-center justify-between gap-2 min-h-[68px]">
          <div class="flex items-center gap-3 min-w-0">
            <div class="h-9 w-9 rounded-2xl flex-shrink-0 bg-gradient-to-tr from-violet-600 to-violet-700 flex items-center justify-center shadow-sm">
              <span class="text-white font-bold text-base">R</span>
            </div>
            <div class="ss-brand-text min-w-0">
              <div class="text-xs font-semibold uppercase tracking-[0.2em] text-violet-500">Recruiter</div>
              <div class="text-base font-bold text-slate-800 leading-tight">SkillSevak</div>
            </div>
          </div>
          <!-- Toggle button -->
          <button id="sidebar-toggle"
                  onclick="toggleSidebar()"
                  class="flex-shrink-0 w-7 h-7 rounded-lg border border-slate-200 bg-white flex items-center justify-center text-slate-400 hover:text-violet-600 hover:border-violet-200 hover:bg-violet-50 transition-colors"
                  title="Toggle sidebar">
            <!-- Left-pointing chevrons -->
            <svg id="sidebar-toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
        </div>

        <!-- Nav -->
        <nav class="flex-1 px-2.5 py-4 space-y-1 text-sm font-medium">
          <a href="{% url 'jobs' %}"
             class="ss-nav-link flex items-center gap-3 px-3 py-2 rounded-xl transition-colors
                    {% if request.resolver_match.url_name == 'jobs' %}bg-violet-600 text-white{% else %}text-slate-600 hover:bg-slate-100{% endif %}">
            <span class="ss-nav-icon w-6 h-6 flex-shrink-0 rounded-lg flex items-center justify-center text-xs font-semibold
                         {% if request.resolver_match.url_name == 'jobs' %}bg-white/20 text-white{% else %}bg-violet-100 text-violet-600{% endif %}">J</span>
            <span class="ss-label">Jobs</span>
          </a>
          <a href="{% url 'pipeline' %}"
             class="ss-nav-link flex items-center gap-3 px-3 py-2 rounded-xl transition-colors
                    {% if request.resolver_match.url_name == 'pipeline' %}bg-violet-600 text-white{% else %}text-slate-600 hover:bg-slate-100{% endif %}">
            <span class="ss-nav-icon w-6 h-6 flex-shrink-0 rounded-lg flex items-center justify-center text-xs font-semibold
                         {% if request.resolver_match.url_name == 'pipeline' %}bg-white/20 text-white{% else %}bg-violet-100 text-violet-600{% endif %}">P</span>
            <span class="ss-label">Pipeline</span>
          </a>
          <a href="{% url 'schedule' %}"
             class="ss-nav-link flex items-center gap-3 px-3 py-2 rounded-xl transition-colors
                    {% if request.resolver_match.url_name == 'schedule' %}bg-violet-600 text-white{% else %}text-slate-600 hover:bg-slate-100{% endif %}">
            <span class="ss-nav-icon w-6 h-6 flex-shrink-0 rounded-lg flex items-center justify-center text-xs font-semibold
                         {% if request.resolver_match.url_name == 'schedule' %}bg-white/20 text-white{% else %}bg-violet-100 text-violet-600{% endif %}">S</span>
            <span class="ss-label">Schedule</span>
          </a>
          <a href="{% url 'analytics' %}"
             class="ss-nav-link flex items-center gap-3 px-3 py-2 rounded-xl transition-colors
                    {% if request.resolver_match.url_name == 'analytics' %}bg-violet-600 text-white{% else %}text-slate-600 hover:bg-slate-100{% endif %}">
            <span class="ss-nav-icon w-6 h-6 flex-shrink-0 rounded-lg flex items-center justify-center text-xs font-semibold
                         {% if request.resolver_match.url_name == 'analytics' %}bg-white/20 text-white{% else %}bg-violet-100 text-violet-600{% endif %}">A</span>
            <span class="ss-label">Analytics</span>
          </a>
          <a href="{% url 'email_templates' %}"
             class="ss-nav-link flex items-center gap-3 px-3 py-2 rounded-xl transition-colors
                    {% if request.resolver_match.url_name == 'email_templates' %}bg-violet-600 text-white{% else %}text-slate-600 hover:bg-slate-100{% endif %}">
            <span class="ss-nav-icon w-6 h-6 flex-shrink-0 rounded-lg flex items-center justify-center text-xs font-semibold
                         {% if request.resolver_match.url_name == 'email_templates' %}bg-white/20 text-white{% else %}bg-violet-100 text-violet-600{% endif %}">T</span>
            <span class="ss-label">Templates</span>
          </a>
        </nav>
      </aside>

      <!-- Mobile header -->
      <header class="md:hidden fixed inset-x-0 top-0 z-30 bg-white/90 backdrop-blur-xl border-b border-slate-200/60">
        <div class="flex items-center justify-between px-4 py-3">
          <div class="flex items-center gap-2">
            <div class="h-8 w-8 rounded-xl bg-gradient-to-tr from-violet-600 to-violet-700 flex items-center justify-center shadow-sm">
              <span class="text-white font-bold text-sm">R</span>
            </div>
            <span class="font-semibold text-slate-800">SkillSevak</span>
          </div>
          <button type="button" class="inline-flex items-center justify-center rounded-lg border border-slate-200 bg-white/80 px-2.5 py-1.5 text-slate-700 shadow-sm">
            <span class="sr-only">Open navigation</span>
            <span class="h-0.5 w-5 bg-slate-700 block mb-1"></span>
            <span class="h-0.5 w-5 bg-slate-700 block mb-1"></span>
            <span class="h-0.5 w-5 bg-slate-700 block"></span>
          </button>
        </div>
      </header>

      <!-- Main content -->
      <main class="flex-1 min-w-0 bg-[#F8FAFC]">
        <div class="w-full max-w-7xl mx-auto px-4 md:px-8 py-6 md:py-10 pt-20 md:pt-10">
          {% block content %}{% endblock %}
        </div>
      </main>

    </div>

    <script>
      function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('ss-collapsed');
        // Persist preference
        localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('ss-collapsed') ? '1' : '0');
      }

      // Restore preference on load
      (function() {
        if (localStorage.getItem('sidebarCollapsed') === '1') {
          const sidebar = document.getElementById('sidebar');
          if (sidebar) sidebar.classList.add('ss-collapsed');
        }
      })();
    </script>

  {% block extra_js %}{% endblock %}
  </body>
</html>
