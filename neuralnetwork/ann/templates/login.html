{% load static socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillSevak – Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg,
        #7c3aed 0%, #9333ea 20%, #a855f7 45%,
        #c084fc 68%, #ddb6fa 82%, #ede9fe 95%, #f3f0ff 100%);
      overflow: hidden;
      position: relative;
    }

    /* ── Ghost UI cards in background ── */
    .bg-card {
      position: absolute;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 14px;
      backdrop-filter: blur(2px);
    }
    .bg-inner {
      position: absolute;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
    }
    .bg-line {
      position: absolute;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.20);
    }
    .bg-dot-grid {
      position: absolute;
      display: grid;
      grid-template-columns: repeat(3, 8px);
      gap: 5px;
    }
    .bg-dot {
      width: 7px; height: 7px;
      border-radius: 3px;
      background: rgba(255,255,255,0.22);
    }

    /* ── Login card ── */
    .login-card {
      position: relative;
      z-index: 10;
      background: white;
      border-radius: 22px;
      padding: 40px 44px 36px;
      width: 100%;
      max-width: 420px;
      margin: 16px;
      box-shadow: 0 24px 80px rgba(100,30,180,0.28), 0 4px 20px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Inputs ── */
    .inp {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.9rem;
      color: #374151;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      margin-bottom: 10px;
    }
    .inp::placeholder { color: #9ca3af; }
    .inp:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,0.10);
    }

    /* ── Sign In button ── */
    .btn-signin {
      width: 100%;
      padding: 13px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #a855f7 0%, #9333ea 50%, #7c3aed 100%);
      box-shadow: 0 4px 18px rgba(168,85,247,0.38), inset 0 1px 0 rgba(255,255,255,0.22);
      transition: transform 0.15s, box-shadow 0.18s;
      margin-bottom: 10px;
      letter-spacing: 0.01em;
    }
    .btn-signin:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 26px rgba(168,85,247,0.46), inset 0 1px 0 rgba(255,255,255,0.22);
    }
    .btn-signin:active { transform: translateY(0); }

    /* ── Google button ── */
    .btn-google {
      width: 100%;
      padding: 11px;
      border-radius: 999px;
      border: 1.5px solid #e5e7eb;
      background: white;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      color: #374151;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 20px;
    }
    .btn-google:hover {
      background: #fafafa;
      border-color: #d1d5db;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    /* ── Register role buttons ── */
    .btn-role {
      padding: 8px 20px;
      border-radius: 999px;
      border: 1.5px solid #d1d5db;
      font-size: 0.8rem;
      font-weight: 500;
      color: #374151;
      background: white;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      display: inline-block;
    }
    .btn-role:hover {
      border-color: #7c3aed;
      color: #7c3aed;
      background: #f5f3ff;
    }
  </style>
</head>
<body>

  <!-- ── Left ghost card ── -->
  <div class="bg-card" style="left:3%;top:12%;width:218px;height:298px;">
    <div class="bg-dot-grid" style="top:14px;left:14px;">
      <div class="bg-dot"></div><div class="bg-dot"></div><div class="bg-dot"></div>
      <div class="bg-dot"></div><div class="bg-dot"></div><div class="bg-dot"></div>
      <div class="bg-dot"></div><div class="bg-dot"></div><div class="bg-dot"></div>
    </div>
    <div class="bg-line" style="top:68px;left:14px;width:88px;"></div>
    <div class="bg-line" style="top:82px;left:14px;width:56px;background:rgba(255,255,255,0.12);"></div>
    <div class="bg-inner" style="top:104px;left:14px;right:14px;height:50px;">
      <div style="position:absolute;left:10px;top:10px;width:26px;height:26px;border-radius:999px;background:rgba(255,255,255,0.26);"></div>
      <div class="bg-line" style="top:14px;left:46px;width:58px;background:rgba(255,255,255,0.22);"></div>
      <div class="bg-line" style="top:26px;left:46px;width:38px;background:rgba(255,255,255,0.13);"></div>
    </div>
    <div class="bg-inner" style="top:164px;left:14px;right:14px;height:50px;">
      <div style="position:absolute;left:10px;top:10px;width:26px;height:26px;border-radius:999px;background:rgba(255,255,255,0.20);"></div>
      <div class="bg-line" style="top:14px;left:46px;width:52px;background:rgba(255,255,255,0.18);"></div>
      <div class="bg-line" style="top:26px;left:46px;width:34px;background:rgba(255,255,255,0.10);"></div>
    </div>
    <div class="bg-inner" style="top:224px;left:14px;right:14px;height:50px;">
      <div style="position:absolute;left:10px;top:10px;width:26px;height:26px;border-radius:999px;background:rgba(255,255,255,0.16);"></div>
      <div class="bg-line" style="top:14px;left:46px;width:62px;background:rgba(255,255,255,0.16);"></div>
      <div class="bg-line" style="top:26px;left:46px;width:40px;background:rgba(255,255,255,0.10);"></div>
    </div>
  </div>

  <!-- Left dot cluster -->
  <div class="bg-dot-grid" style="position:absolute;left:7%;top:14%;">
    <div class="bg-dot"></div><div class="bg-dot"></div><div class="bg-dot"></div>
    <div class="bg-dot"></div><div class="bg-dot"></div><div class="bg-dot"></div>
    <div class="bg-dot"></div><div class="bg-dot"></div><div class="bg-dot"></div>
  </div>

  <!-- Left bottom circle -->
  <div style="position:absolute;left:9%;bottom:14%;width:52px;height:52px;border-radius:999px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.22);display:flex;align-items:center;justify-content:center;">
    <div style="width:26px;height:26px;border-radius:999px;border:2px solid rgba(255,255,255,0.40);display:flex;align-items:center;justify-content:center;">
      <div style="width:10px;height:10px;border-radius:999px;background:rgba(255,255,255,0.50);"></div>
    </div>
  </div>

  <!-- ── Right ghost card ── -->
  <div class="bg-card" style="right:2%;top:8%;width:228px;height:318px;">
    <div class="bg-line" style="top:16px;left:14px;width:100px;"></div>
    <div class="bg-line" style="top:30px;left:14px;width:58px;background:rgba(255,255,255,0.11);"></div>
    <div class="bg-inner" style="top:56px;left:14px;right:14px;height:38px;"></div>
    <div class="bg-inner" style="top:103px;left:14px;right:14px;height:38px;"></div>
    <div class="bg-inner" style="top:150px;left:14px;right:14px;height:38px;"></div>
    <div class="bg-inner" style="top:197px;left:14px;right:14px;height:38px;"></div>
    <div style="position:absolute;bottom:14px;right:14px;width:14px;height:14px;border-radius:999px;background:rgba(255,255,255,0.26);"></div>
  </div>

  <!-- Right mid card -->
  <div class="bg-card" style="right:4%;bottom:12%;width:190px;height:118px;">
    <div class="bg-line" style="top:16px;left:14px;width:78px;"></div>
    <div class="bg-line" style="top:30px;left:14px;width:48px;background:rgba(255,255,255,0.11);"></div>
    <div style="position:absolute;bottom:14px;left:14px;right:14px;height:36px;background:rgba(255,255,255,0.12);border-radius:7px;"></div>
  </div>

  <!-- Right dot cluster -->
  <div class="bg-dot-grid" style="position:absolute;right:8%;top:18%;">
    <div class="bg-dot"></div><div class="bg-dot"></div><div class="bg-dot"></div>
    <div class="bg-dot"></div><div class="bg-dot"></div><div class="bg-dot"></div>
    <div class="bg-dot"></div><div class="bg-dot"></div><div class="bg-dot"></div>
  </div>

  <!-- ── Login Card ── -->
  <div class="login-card">

    <!-- Brand -->
    <p style="font-size:0.88rem;font-weight:700;color:#1a1730;margin-bottom:16px;text-align:center;">SkillSevak</p>

    <!-- Title -->
    <h1 style="font-size:1.75rem;font-weight:800;color:#1a1730;text-align:center;margin-bottom:24px;letter-spacing:-0.02em;">Welcome Back</h1>

    <!-- Form — all names/IDs/actions preserved -->
    <form method="post" action="{% url 'login' %}" style="width:100%;">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <input class="inp" type="email" id="email" name="email" placeholder="Email" autocomplete="email" required />
      <input class="inp" type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" required style="margin-bottom:4px;" />

      <!-- Remember me + Forgot password -->
      <div style="width:100%;display:flex;align-items:center;gap:8px;margin-bottom:18px;margin-top:6px;">
        <input type="checkbox" id="remember-me" name="remember-me"
               style="width:14px;height:14px;accent-color:#7c3aed;cursor:pointer;border-radius:3px;flex-shrink:0;" />
        <label for="remember-me" style="font-size:0.78rem;color:#6b7280;cursor:pointer;">Remember me</label>
        <a href="#" style="margin-left:auto;font-size:0.78rem;color:#6b7280;text-decoration:none;transition:color 0.15s;"
           onmouseover="this.style.color='#7c3aed'" onmouseout="this.style.color='#6b7280'">Forgot password</a>
      </div>

      <!-- Sign In -->
      <button type="submit" class="btn-signin">Sign In</button>
    </form>

    <!-- Google -->
    <a href="{% provider_login_url 'google' next=next|default:'/' %}" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 7.172 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </a>

    <!-- Register row -->
    <p style="font-size:0.8rem;color:#6b7280;margin-bottom:10px;text-align:center;">Don't have an account?</p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <a href="{% url 'register_job_seeker' %}" class="btn-role">Job Seeker</a>
      <a href="{% url 'register_company' %}" class="btn-role">Company</a>
    </div>

    <!-- Back to home -->
    <a href="{% url 'index' %}"
       style="margin-top:18px;font-size:0.78rem;color:#9ca3af;text-decoration:none;display:flex;align-items:center;gap:4px;transition:color 0.15s;"
       onmouseover="this.style.color='#6b7280'" onmouseout="this.style.color='#9ca3af'">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
      Back to home
    </a>

  </div>

  <!-- Django messages -->
  {% if messages %}
  <div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);width:100%;max-width:400px;padding:0 16px;z-index:50;">
    {% for message in messages %}
    <div style="margin-bottom:8px;padding:14px 16px;border-radius:12px;font-size:0.85rem;
                {% if message.tags == 'error' %}background:#fff1f2;border:1px solid #fecdd3;color:#be123c;
                {% else %}background:#f0fdf4;border:1px solid #bbf7d0;color:#15803d;{% endif %}">
      {{ message }}
    </div>
    {% endfor %}
  </div>
  {% endif %}

</body>
</html>
