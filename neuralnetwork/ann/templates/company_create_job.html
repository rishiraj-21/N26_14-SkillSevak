{% extends "recruiter_layout.html" %}

{% block title %}Post a Job{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-6">
  <h1 class="text-2xl font-bold text-slate-800">Post a New Job</h1>

  <form method="post" class="backdrop-blur-xl bg-white/60 border border-slate-200/40 rounded-2xl p-6 space-y-4">
    {% csrf_token %}

    <div>
      <label class="block text-xs font-medium text-slate-600 mb-1">Job Title</label>
      <input name="title" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm" required />
    </div>

    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Location</label>
        <input name="location" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm" required />
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Category</label>
        <input name="category" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm" placeholder="Developer, Sales, ..." />
      </div>
    </div>

    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Min Salary</label>
        <input type="number" name="salary_min" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Max Salary</label>
        <input type="number" name="salary_max" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm" />
      </div>
    </div>

    <div>
      <label class="block text-xs font-medium text-slate-600 mb-1">Job Type</label>
      <select name="job_type" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm">
        <option value="full-time">Full-time</option>
        <option value="part-time">Part-time</option>
        <option value="contract">Contract</option>
        <option value="internship">Internship</option>
      </select>
    </div>

    <div>
      <label class="block text-xs font-medium text-slate-600 mb-1">Required Skills (comma separated)</label>
      <input name="skills_required" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm" placeholder="Python, Django, REST, ..." />
    </div>

    <div>
      <label class="block text-xs font-medium text-slate-600 mb-1">Description</label>
      <textarea name="description" rows="4" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm" required></textarea>
    </div>

    <div>
      <label class="block text-xs font-medium text-slate-600 mb-1">Requirements</label>
      <textarea name="requirements" rows="3" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm" required></textarea>
    </div>

    <div>
      <label class="block text-xs font-medium text-slate-600 mb-1">Benefits (optional)</label>
      <textarea name="benefits" rows="3" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm"></textarea>
    </div>

    <div class="flex justify-end gap-3 pt-2">
      <a href="{% url 'company_jobs' %}" class="text-xs font-semibold text-slate-600 px-3 py-2 rounded-xl border border-slate-200">
        Cancel
      </a>
      <button class="bg-indigo-600 text-white text-sm font-semibold px-4 py-2 rounded-xl">
        Publish Job
      </button>
    </div>
  </form>
</div>
{% endblock %}
