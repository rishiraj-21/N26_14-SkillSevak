{% extends "recruiter_layout.html" %}

{% block title %}Schedule Interview · SkillSevak{% endblock %}

{% block content %}
  <div class="max-w-2xl mx-auto space-y-6">
    <!-- Header -->
    <div class="flex items-center gap-4">
      <a href="{% url 'schedule' %}"
         class="inline-flex items-center justify-center w-9 h-9 rounded-xl bg-white border border-slate-200 text-slate-500 hover:text-slate-700 shadow-sm">
        &#8592;
      </a>
      <div>
        <h1 class="text-2xl font-bold text-slate-800">Schedule Interview</h1>
        <p class="text-slate-500 text-sm mt-0.5">Fill in the details below to book an interview slot</p>
      </div>
    </div>

    <!-- Form card -->
    <div class="backdrop-blur-xl bg-white/60 border border-slate-200/40 rounded-2xl p-8 shadow-sm">
      <form method="post" action="{% url 'interview_create' %}">
        {% csrf_token %}

        <!-- Application -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-slate-700 mb-1.5" for="application_id">
            Candidate &amp; Job <span class="text-rose-500">*</span>
          </label>
          <select id="application_id" name="application_id" required
                  class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm text-slate-800 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="">— Select application —</option>
            {% for app in applications %}
              <option value="{{ app.id }}">
                {% if app.candidate.candidateprofile.full_name %}{{ app.candidate.candidateprofile.full_name }}{% else %}{{ app.candidate.username }}{% endif %}
                — {{ app.job.title }}
              </option>
            {% endfor %}
          </select>
        </div>

        <!-- Date & Time + Duration (2 columns) -->
        <div class="grid grid-cols-2 gap-4 mb-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5" for="scheduled_date">
              Date &amp; Time <span class="text-rose-500">*</span>
            </label>
            <input type="datetime-local" id="scheduled_date" name="scheduled_date" required
                   class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm text-slate-800 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5" for="duration_minutes">
              Duration (minutes)
            </label>
            <input type="number" id="duration_minutes" name="duration_minutes"
                   value="60" min="15" max="480" step="15"
                   class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm text-slate-800 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
        </div>

        <!-- Interview Type -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-slate-700 mb-1.5" for="interview_type">
            Interview Type
          </label>
          <select id="interview_type" name="interview_type"
                  class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm text-slate-800 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            {% for value, label in interview_types %}
              <option value="{{ value }}" {% if value == 'technical' %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Meeting Link -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-slate-700 mb-1.5" for="meeting_link">
            Meeting Link
          </label>
          <input type="url" id="meeting_link" name="meeting_link"
                 placeholder="https://meet.google.com/..."
                 class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm text-slate-800 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>

        <!-- Location + Interviewer (2 columns) -->
        <div class="grid grid-cols-2 gap-4 mb-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5" for="location">
              Location
            </label>
            <input type="text" id="location" name="location"
                   placeholder="Room 3B or Remote"
                   class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm text-slate-800 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5" for="interviewer">
              Interviewer
            </label>
            <input type="text" id="interviewer" name="interviewer"
                   placeholder="Interviewer name"
                   class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm text-slate-800 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          </div>
        </div>

        <!-- Notes -->
        <div class="mb-8">
          <label class="block text-sm font-medium text-slate-700 mb-1.5" for="notes">
            Notes
          </label>
          <textarea id="notes" name="notes" rows="3"
                    placeholder="Any additional notes for the interview..."
                    class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm text-slate-800 shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
        </div>

        <!-- Actions -->
        <div class="flex items-center justify-end gap-3">
          <a href="{% url 'schedule' %}"
             class="px-5 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-600 hover:bg-slate-50 transition-colors">
            Cancel
          </a>
          <button type="submit"
                  class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-indigo-600 to-indigo-700 text-sm font-semibold text-white shadow-sm hover:from-indigo-700 hover:to-indigo-800 transition-all">
            Schedule Interview
          </button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}

{% block extra_js %}
<script>
  // Pre-select application if passed from the 2-step modal
  const preselect = new URLSearchParams(window.location.search).get('application_id');
  if (preselect) {
    const sel = document.getElementById('application_id');
    if (sel) sel.value = preselect;
  }
</script>
{% endblock %}
