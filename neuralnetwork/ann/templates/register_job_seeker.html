{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register – Job Seeker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center">
  <div class="w-full max-w-md bg-white/80 backdrop-blur-xl border border-slate-200/40 rounded-2xl shadow-sm p-8">
    <h1 class="text-2xl font-bold text-slate-800 mb-6">Create Job Seeker Account</h1>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Full Name</label>
        <input name="name" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm" required />
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Email</label>
        <input type="email" name="email" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm" required />
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Phone</label>
        <input name="phone" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-600 mb-1">Password</label>
        <input type="password" name="password" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-sm" required />
      </div>
      <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold py-2.5 rounded-xl">
        Sign Up
      </button>
    </form>
    <p class="mt-4 text-xs text-slate-500">
      Already have an account?
      <a href="{% url 'login' %}" class="text-indigo-600 font-medium">Log in</a>
    </p>
  </div>
</body>
</html>
